<style>
  :root{--lav1:#F6F4FA;--lav3:#CEC8D9;--lav6:#7E778C;--slate2:#363140;--pistachio:#74A686;--watermelon:#FFADAD;}

    background:var(--pistachio);border:0;border-radius:8px;cursor:pointer;}

  .err{color:#B3413D;font-size:12.5px;margin-top:12px;min-height:16px;}

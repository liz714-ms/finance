<style>
  :root{--lav1:#F6F4FA;--lav3:#CEC8D9;--lav6:#7E778C;--slate2:#363140;--pistachio:#74A686;--watermelon:#FFADAD;}

  button{width:100%;margin-top:12px;padding:11px;font-size:14.5px;font-weight:600;color:#fff;
    background:var(--pistachio);border:0;border-radius:8px;cursor:pointer;}
  button:disabled{opacity:.6;cursor:default;}
  .err{color:#B3413D;font-size:12.5px;margin-top:12px;min-height:16px;}
  .conf{margin-top:18px;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--lav6);}
